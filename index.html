<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Commercial Management Plan</title>
<style>
:root{
  --bg:#f4f7f8; --panel:#fff; --line:#d7dde2; --line2:#eef2f4; --text:#18313a; --muted:#617987;
  --brand:#6f9495; --brand2:#0f67a8; --ok:#0f9d58; --warn:#d88600; --danger:#c13e34; --soft:#f7fafb;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}
.app{display:grid;grid-template-columns:290px 1fr;min-height:100vh}
.sidebar{background:#fff;border-right:1px solid var(--line);padding:18px;position:sticky;top:0;height:100vh;overflow:auto}
.logo-wrap img{width:160px;display:block;margin:0 auto 12px auto}
.brand-title{font-size:24px;font-weight:800;margin:0}
.brand-sub{font-size:12px;color:var(--muted);line-height:1.5;margin-top:6px}
.nav{display:grid;gap:8px;margin-top:18px}
.nav button{background:#fff;border:1px solid transparent;color:var(--text);padding:12px 14px;border-radius:12px;text-align:left;font-weight:700;cursor:pointer}
.nav button.active{background:#f0f5f5;border-color:#dbe7e7;color:#3b5d5e}
.main{padding:18px 22px}
.topbar{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px}
.page-title{font-size:30px;font-weight:800;margin:0}
.page-sub{font-size:13px;color:var(--muted);margin-top:4px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap}
button,.btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 14px;cursor:pointer;font:inherit}
button.primary,.btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
button.danger{color:var(--danger);background:#fff7f6;border-color:#efc3be}
button.small{padding:7px 10px;font-size:12px}
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
.split-narrow { grid-template-columns: 260px 1fr;gap:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 8px 20px rgba(0,0,0,.03)}
.section-title{font-size:18px;font-weight:800;margin:0 0 12px}
.kpi-label{font-size:12px;color:var(--muted);font-weight:700}
.kpi-value{font-size:30px;font-weight:800;margin-top:6px}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:6px}
.form-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.form-grid .wide-2{grid-column:span 2}
.form-grid .wide-3{grid-column:span 3}
.form-grid .wide-4{grid-column:1/-1}
label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px}
input[type=text],input[type=date],input[type=email],select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff;color:var(--text);font:inherit}
input.num{width:100%;text-align:right}
textarea{min-height:42px;resize:vertical;overflow:hidden;line-height:1.35;white-space:pre-wrap;overflow-wrap:anywhere}
.table-wrap{border:1px solid var(--line);border-radius:14px;overflow:auto;background:#fff}
.table-wrap.tall{max-height:unset}
table{width:100%;border-collapse:separate;border-spacing:0;table-layout:auto}
th,td{border-bottom:1px solid var(--line2);padding:10px 8px;vertical-align:top;text-align:left}
th{position:sticky;top:0;background:#fafcfc;z-index:1;font-size:11px;text-transform:uppercase;letter-spacing:.01em;color:#536a77}
td.right,th.right{text-align:right}
td.center,th.center{text-align:center}
.badge{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:700;background:#fff}
.notice{padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:#fff}
.notice.warn{background:#fff8ef;border-color:#f0d7aa}
.notice.good{background:#f2fbf6;border-color:#c8ead4}
.notice.bad{background:#fff6f5;border-color:#f0c6c2}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.between{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
.tabs{display:flex;gap:8px;flex-wrap:wrap}
.tabs button.active{background:#f0f5f5;border-color:#dbe7e7;color:#3b5d5e}
.empty{border:1px dashed #ccd8dc;border-radius:12px;background:#fbfcfc;padding:20px;text-align:center;color:var(--muted)}
.report-page{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px}
.report-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;border-bottom:2px solid #dbe5e8;padding-bottom:10px;margin-bottom:14px}
.report-head img{height:38px;width:auto}
.report-title{font-size:22px;font-weight:800;margin:0}
.report-sub{font-size:12px;color:var(--muted);margin-top:4px}
.month-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.month-card{border:1px solid var(--line);border-radius:12px;background:#fff;padding:12px;cursor:pointer}
.month-card.active{background:#f0f5f5;border-color:#dbe7e7}
.chart-box{border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff}
svg{width:100%;height:260px;display:block}
.small-note{font-size:12px;color:var(--muted);line-height:1.5}
.desc-wide{min-width:260px}
@media (max-width:1100px){
  .app{grid-template-columns:1fr}
  .sidebar{position:static;height:auto}
  .grid-2,.grid-3,.grid-4,.form-grid,.split-narrow{grid-template-columns:1fr}
  .form-grid .wide-2,.form-grid .wide-3,.form-grid .wide-4{grid-column:auto}
}
@media print{
  body{background:#fff}
  .sidebar,.topbar,.no-print{display:none !important}
  .app{display:block}
  .main{padding:0}
  .card,.report-page,.chart-box{border:none;box-shadow:none;padding:0}
  .table-wrap{overflow:visible;border:none}
  th{position:static;background:#fff}

  /* hide consultant / contractor picker panel in print only */
  .split-narrow{display:block !important}
  .split-narrow > .card:first-child{display:none !important}

  /* make printed contractor / consultant tables read like issued documents */
  input,select,textarea{
    border:none !important;
    background:transparent !important;
    padding:0 !important;
    margin:0 !important;
    box-shadow:none !important;
    outline:none !important;
    color:var(--text) !important;
    width:100% !important;
    min-height:auto !important;
    resize:none !important;
    appearance:none !important;
    -webkit-appearance:none !important;
    font-size:8.8px !important;
    line-height:1.1 !important;
  }

  textarea{
    overflow:visible !important;
  }

  input[type=checkbox]{
    width:12px !important;
    height:12px !important;
    border:1px solid #444 !important;
    appearance:auto !important;
    -webkit-appearance:checkbox !important;
    transform:scale(.85) !important;
  }

  .table-wrap table{
    table-layout:fixed !important;
  }

  .table-wrap th,
  .table-wrap td{
    padding:4px 4px !important;
    line-height:1.1 !important;
  }

  .table-wrap th{
    font-size:8px !important;
    text-align:center !important;
    vertical-align:bottom !important;
    letter-spacing:0 !important;
  }

  .table-wrap td{
    font-size:8.8px !important;
  }

  /* give description room in print on dense contractor registers */
  .table-wrap th:nth-child(1),
  .table-wrap td:nth-child(1){width:7% !important}
  .table-wrap th:nth-child(2),
  .table-wrap td:nth-child(2){width:30% !important}
}

</style>
</head>

const STORAGE_KEY = "spma-commercial-management-public-template-v1";
const DEFAULT_DATA = {"project": {"name": "", "number": "", "client": "", "address": "", "superintendent": "", "committee": []}, "consultants": [], "contractors": [], "rfi": []};

function loadData(){ try{ const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : structuredClone(DEFAULT_DATA);} catch(e){ return structuredClone(DEFAULT_DATA);} }
function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data)); }
function migrateAllContractors(){ (state.data.contractors||[]).forEach(c=>ensureContractorMigrated(c)); }
function clone(v){ return JSON.parse(JSON.stringify(v)); }
function uid(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4); }
function today(){ return new Date().toISOString().slice(0,10); }
function fmtMoney(n){ return new Intl.NumberFormat("en-AU",{style:"currency",currency:"AUD",minimumFractionDigits:2,maximumFractionDigits:2}).format(Number(n||0)); }
function fmtPct(n){ return (Number(n||0)).toFixed(1)+"%"; }
function fmtDate(v){ if(!v) return ""; const d=new Date(v); return isNaN(d)? v : d.toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"numeric"}); }
function monthKey(v){ if(!v) return ""; const d = new Date(v); return isNaN(d) ? "" : d.toISOString().slice(0,7); }
function monthLabel(v){ if(!v) return ""; const [y,m] = v.split("-"); return new Date(Number(y),Number(m)-1,1).toLocaleDateString("en-AU",{month:"long",year:"numeric"}); }
function esc(s){ return String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function parseNum(v){ if(v===null || v===undefined || v==="") return 0; const n = Number(String(v).replace(/[^0-9.-]/g,"")); return Number.isFinite(n) ? n : 0; }
function autoGrow(el){ if(!el) return; el.style.height="auto"; el.style.height=(el.scrollHeight+2)+"px"; }
function bindGrow(){ document.querySelectorAll("textarea").forEach(t=>{ autoGrow(t); t.addEventListener("input", e=>autoGrow(e.target)); }); }

function isNSWBusinessDay(date){
  const d = new Date(date);
  if(d.getDay()===0 || d.getDay()===6) return false;
  const mm = d.getMonth()+1, dd = d.getDate();
  if(mm===12 && dd>=27 && dd<=31) return false;
  const holidays = nswHolidaySet(d.getFullYear());
  return !holidays.has(d.toISOString().slice(0,10));
}
function nthWeekday(year, month, weekday, n){

  while(d.getMonth()===month){ if(d.getDay()===weekday){ count++; if(count===n) return new Date(d); } d.setDate(d.getDate()+1); }
  return null;
}
function easterSunday(year){
  const a=year%19,b=Math.floor(year/100),c=year%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),month=Math.floor((h+l-7*m+114)/31)-1,day=((h+l-7*m+114)%31)+1;
  return new Date(year,month,day);
}
function observed(date){
  const d=new Date(date); if(d.getDay()===6) d.setDate(d.getDate()+2); else if(d.getDay()===0) d.setDate(d.getDate()+1); return d;
}
function nswHolidaySet(year){
  const set=new Set(); const key=d=>d.toISOString().slice(0,10);
  set.add(key(observed(new Date(year,0,1))));
  set.add(key(observed(new Date(year,0,26))));
  const easter=easterSunday(year); const good=new Date(easter); good.setDate(easter.getDate()-2); const mon=new Date(easter); mon.setDate(easter.getDate()+1);
  set.add(key(good)); set.add(key(mon));
  set.add(key(observed(new Date(year,3,25))));
  set.add(key(nthWeekday(year,5,1,2)));
  set.add(key(nthWeekday(year,9,1,1)));
  set.add(key(observed(new Date(year,11,25))));
  set.add(key(observed(new Date(year,11,26))));
  return set;
}
function addBusinessDays(startISO, days){
  if(!startISO) return ""; let d=new Date(startISO); let added=0;
  while(added<days){ d.setDate(d.getDate()+1); if(isNSWBusinessDay(d)) added++; }
  return d.toISOString().slice(0,10);
}
function addCalendarDays(startISO, days){
  if(!startISO) return ""; const d=new Date(startISO); d.setDate(d.getDate()+Number(days||0)); return d.toISOString().slice(0,10);
}
function businessDaysRemaining(toISO){
  if(!toISO) return null; let now = new Date(today()); const end = new Date(toISO); let count=0, sign=1;
  if(now > end){ const tmp=now; now=end; endtmp=tmp; }
  let d=new Date(now);
  while(d<end){ d.setDate(d.getDate()+1); if(isNSWBusinessDay(d)) count++; }
  return new Date(today()) <= new Date(toISO) ? count : -count;
}

function feeItemBase(item){
  const base = item.billingType==="Hourly" ? parseNum(item.hourlyRate) * parseNum(item.hoursCap) : parseNum(item.value);
  return base + base * parseNum(item.contingencyPct)/100;
}
function certifiedAgainstConsultant(engagement, type, refId){
  return (engagement.certifiedInvoices||[]).reduce((sum, inv)=> sum + (inv.lines||[]).filter(l=>l.type===type && l.refId===refId).reduce((s,l)=>s+parseNum(l.amountEx),0), 0);
}
function consultantEngagementTotals(e){
  const fee = (e.feeItems||[]).reduce((s,i)=>s+feeItemBase(i),0);
  const vars = (e.variations||[]).reduce((s,v)=>s+parseNum(v.value),0);
  const disb = (e.disbursements||[]).reduce((s,d)=>s+parseNum(d.value),0);
  const adjusted = fee + vars + disb;
  const certified = (e.certifiedInvoices||[]).reduce((s,i)=>s+parseNum(i.totalEx),0);
  return {fee, vars, disb, adjusted, certified};
}
function contractorOriginal(c){
  const ct = getCurrentContract(c) || c;
  return (ct.pricing||[]).reduce((s,i)=>s+parseNum(i.value),0) + (ct.provisionalSums||[]).reduce((s,i)=>s+parseNum(i.value),0) + (ct.primeCostSums||[]).reduce((s,i)=>s+parseNum(i.value),0);
}
function variationEstimate(v){
  const submitted=parseNum(v.submittedValue), unapproved=parseNum(v.unapprovedValue);
  const calc=Math.max(0, submitted - unapproved);
  const status=v.status||"";
  if(status==="APPROVED" || status==="AWAITING FURTHER CLARIFICATION" || status==="TO BE COMPLETED/ASSESSED" || status==="ASSESSED + LOR Sent - AWAITING APPROVAL" || status==="ASSESSED - BUT ON HOLD") return calc;
  return 0;
}
function variationApproved(v){ return v.status==="APPROVED" ? variationEstimate(v) : 0; }
function contractorApprovedVariationValue(c){ const ct=getCurrentContract(c)||c; return (ct.variations||[]).reduce((s,v)=>s+variationApproved(v),0); }
function contractorAdjustedContract(c){ return contractorOriginal(c) + contractorApprovedVariationValue(c); }
function contractorCertifiedToDate(c){ const ct=getCurrentContract(c)||c; return (ct.progressCertificates||[]).reduce((s,p)=>s+parseNum(p.assessedEx),0); }
function contractorRetentionHeld(c){ const ct=getCurrentContract(c)||c; return (ct.progressCertificates||[]).reduce((s,p)=>s+parseNum(p.retentionAmount),0); }
function originalContractPeriodDays(c){
  const ct=getCurrentContract(c)||c;
  if(!ct.executionDate || !ct.originalPCDate) return "";
  const a = new Date(ct.executionDate + "T00:00:00");
  const b = new Date(ct.originalPCDate + "T00:00:00");
  if(isNaN(a) || isNaN(b)) return "";
  return Math.max(0, Math.round((b - a) / 86400000));
}
function adjustedPCDate(c){
  const ct=getCurrentContract(c)||c;
  if(!ct.originalPCDate) return "";
  const approvedDays = (ct.eot||[]).reduce((s,e)=>s+parseNum(e.approvedDays),0);
  return addBusinessDays(ct.originalPCDate, approvedDays);
}

function cumulativeProportion(x){
  if(x<=0) return 0;
  if(x>=1) return 1;
  if(x<1/3) return 9*(x*x)/4;
  if(x<2/3) return 1.5*x - 0.25;
  return 4.5*x - 2.25*(x*x) - 1.25;
}
function daysBetween(a,b){
  const x = a ? new Date(a+"T00:00:00") : null;
  const y = b ? new Date(b+"T00:00:00") : null;
  if(!x || !y || isNaN(x) || isNaN(y)) return 0;
  return Math.round((y-x)/86400000);
}
function buildBromilowSeries(c){
  const start = c.commencementDate || "";
  const end = adjustedPCDate(c) || c.originalPCDate || "";
  const contractValue = Number(contractorAdjustedContract(c)||0);
  if(!start || !end || !contractValue) return [];
  const startDate = new Date(start+"T00:00:00");
  const endDate = new Date(end+"T00:00:00");
  if(!(startDate < endDate)) return [];
  const totalDays = Math.max(1, daysBetween(start, end));
  const out = [];
  let cursor = new Date(startDate);
  while(cursor <= endDate){
    const iso = cursor.toISOString().slice(0,10);
    const elapsed = Math.max(0, daysBetween(start, iso));
    const prop = cumulativeProportion(elapsed/totalDays);
    const forecast = prop * contractValue;
    const actual = (c.progressCertificates||[])
      .filter(p => p.certificateDate && p.certificateDate <= iso)
      .reduce((s,p)=>s + Number(p.assessedEx||0),0);
    out.push({date:iso, forecast, actual});
    cursor.setMonth(cursor.getMonth()+1);
  }
  if(out[out.length-1]?.date !== end){
    out.push({
      date:end,
      forecast:contractValue,
      actual:(c.progressCertificates||[]).reduce((s,p)=>s + Number(p.assessedEx||0),0)

  }

}
function simpleLineChart(series){
  if(!series.length) return `<div class="empty">Add contractor dates and contract value to generate the Bromilow curve.</div>`;
  const w=900,h=240,p=26;
  const maxY=Math.max(...series.map(r=>Math.max(Number(r.forecast||0),Number(r.actual||0))),1);
  const xs=(i)=>p + (i*(w-2*p)/Math.max(1,series.length-1));
  const ys=(v)=>h-p - ((v/maxY)*(h-2*p));
  const path=(key)=>series.map((r,i)=>`${i===0?'M':'L'} ${xs(i)} ${ys(Number(r[key]||0))}`).join(' ');
  const grid=[0,.25,.5,.75,1].map(g=>`
    <g>
      <line x1="${p}" x2="${w-p}" y1="${ys(maxY*g)}" y2="${ys(maxY*g)}" stroke="#e7edef" />
      <text x="4" y="${ys(maxY*g)+4}" font-size="11" fill="#617987">${fmtMoney(maxY*g)}</text>
    </g>`).join("");
  const labels = series.map((r,i)=>`<text x="${xs(i)}" y="${h-6}" text-anchor="middle" font-size="10" fill="#617987">${new Date(r.date+"T00:00:00").toLocaleDateString("en-AU",{month:"short", year: series.length<7?"numeric":undefined})}</text>`).join("");
  return `<svg viewBox="0 0 ${w} ${h}" class="chart">${grid}<path d="${path("forecast")}" fill="none" stroke="#6f9495" stroke-width="3"/><path d="${path("actual")}" fill="none" stroke="#0f67a8" stroke-width="3"/>${labels}</svg>`;
}
function renderBromilow(c){
  const series = buildBromilowSeries(c);
  return `<div class="chart-box">
    <div class="small-note" style="margin-bottom:8px">Forecast line uses the parabolic / linear / parabolic Bromilow assumption from the earlier revision. Actual line uses certified progress claims entered below.</div>
    ${simpleLineChart(series)}
  </div>`;
}

    if(!item.id) item.id = lines[lines.length-1].refId;
  });
  (e.variations||[]).forEach(item=>{
    lines.push({kind:"Variation", refId:item.id || uid(), description:item.description, maxValue:parseNum(item.value), certifiedToDate:certifiedAgainstConsultant(e,"Variation",item.id||item.description), claimEx:0, hours:0, hourly:false, hourlyRate:0, gstExempt:!!item.gstExempt});
    if(!item.id) item.id = lines[lines.length-1].refId;

  (e.disbursements||[]).forEach(item=>{
    lines.push({kind:"Disbursement", refId:item.id || uid(), description:item.description, maxValue:parseNum(item.value), certifiedToDate:certifiedAgainstConsultant(e,"Disbursement",item.id||item.description), claimEx:0, hours:0, hourly:false, hourlyRate:0, gstExempt:!!item.gstExempt});
    if(!item.id) item.id = lines[lines.length-1].refId;
  });
  return {invoiceNumber:"", invoiceDate:today(), paymentDue:"", lines};
}

function buildProgressDraft(c){

  });

  return {claimDate:today(), claimNumber:"CLAIM-"+String((ct.progressCertificates||[]).length+1).padStart(3,"0"), lines};
}

function renderProgressDraft(c){
  const ci = contractorIndex(c), ct=getCurrentContract(c), j=currentContractIndex(c), d = ct.progressDraft;
  const claimed = (d.lines||[]).reduce((s,l)=>s+parseNum(l.contractorClaim),0);
  const assessed = (d.lines||[]).reduce((s,l)=>s+parseNum(l.assessedValue),0);
  const retentionBase = (d.lines||[]).filter(l=>l.retentionApplicable).reduce((s,l)=>s+parseNum(l.assessedValue),0);
  const retentionHeld = contractorRetentionHeld(c);
  const maxRetentionHeld = contractorAdjustedContract(c) * parseNum(ct.retentionCapPercent)/100;
  const retentionThis = Math.max(0, Math.min(retentionBase * parseNum(ct.retentionPercent)/100, maxRetentionHeld - retentionHeld));
  const gst = (d.lines||[]).reduce((s,l)=>s + (l.gstExempt ? 0 : parseNum(l.assessedValue)*0.10), 0);
  const certifiedEx = Math.max(0, assessed - retentionThis);
  return `

        ${(d.lines||[]).map((l,li)=>{
          const max = l.kind==="Disbursement" ? parseNum(l.contractorClaim || l.assessedValue || 0) : Math.max(0, parseNum(l.maxValue)-parseNum(l.certifiedToDate));
          return `<tr>

            <td class="right">${l.kind==="Disbursement" ? "—" : fmtMoney(max)}</td>
            <td class="right">${inputNum(`contractors.${ci}.contracts.${j}.progressDraft.lines.${li}.contractorClaim`, l.contractorClaim)}</td>
            <td class="right">${inputNum(`contractors.${ci}.contracts.${j}.progressDraft.lines.${li}.assessedValue`, l.assessedValue)}</td>
            <td>${inputTextarea(`contractors.${ci}.contracts.${j}.progressDraft.lines.${li}.reason`, l.reason)}</td>
          </tr>`;
        }).join("")}
        <tr><td colspan="5"><strong>Totals</strong></td><td class="right"><strong>${fmtMoney(claimed)}</strong></td><td class="right"><strong>${fmtMoney(assessed)}</strong></td><td></td></tr>
      </tbody>
    </table>
  </div>
  <div class="row" style="justify-content:flex-end;margin-top:10px">
    <span class="badge">Retention ${fmtMoney(retentionThis)}</span>
    <span class="badge">GST ${fmtMoney(gst)}</span>

  </div>`;
}

function renderMonthlyInvoicePack(){
  const rows = [];
  state.data.consultants.forEach(c=>(c.engagements||[]).forEach(e=>{
    let running=0;
    (e.certifiedInvoices||[]).filter(inv=>monthKey(inv.invoiceDate)===state.reportMonth).forEach(inv=>{
      running = (e.certifiedInvoices||[]).filter(x=>(x.invoiceDate||"") <= (inv.invoiceDate||"")).reduce((s,x)=>s+parseNum(x.totalEx),0);
      const pct = consultantEngagementTotals(e).adjusted ? running / consultantEngagementTotals(e).adjusted * 100 : 0;
      rows.push({consultant:c.name, engagement:e.title, invoice:inv.invoiceNumber, date:inv.invoiceDate, ex:inv.totalEx, certToDate:running, certPct:pct});
    });
  }));
  return `<div class="report-page print-active">
    ${reportHeader("Monthly Invoice Pack")}
    <div class="small-note" style="margin-bottom:10px">Landscape recommended for printing.</div>
    <table>
      <thead><tr><th>Consultant</th><th>Engagement</th><th>Invoice</th><th>Date</th><th class="right">This Certificate Ex GST</th><th class="right">Certified to Date $</th><th class="right">Certified to Date %</th></tr></thead>
      <tbody>
        ${rows.map(r=>`<tr><td>${esc(r.consultant)}</td><td>${esc(r.engagement)}</td><td>${esc(r.invoice)}</td><td>${fmtDate(r.date)}</td><td class="right">${fmtMoney(r.ex)}</td><td class="right">${fmtMoney(r.certToDate)}</td><td class="right">${fmtPct(r.certPct)}</td></tr>`).join("") || `<tr><td colspan="7" class="empty">No certified consultant invoices in the selected month.</td></tr>`}
      </tbody>
    </table>
  </div>`;
}

function printHTML(title, html){
  const root = document.querySelector(".main");
  const temp = document.createElement("div");
  temp.className="print-active";
  temp.innerHTML = html;
  root.appendChild(temp);
  window.print();
  temp.remove();
}
function bindEvents(){
  document.querySelectorAll("[data-act]").forEach(el => el.onclick = handleAction);
  document.querySelectorAll("[data-bind]").forEach(el => el.onchange = e => { setPath(e.target.dataset.bind, e.target.value); renderApp(); });
  document.querySelectorAll("[data-bind-check]").forEach(el => el.onchange = e => { setPath(e.target.dataset.bindCheck, e.target.checked); renderApp(); });
  document.querySelectorAll("[data-bind-num-plain]").forEach(el => el.onchange = e => { setPath(e.target.dataset.bindNumPlain, parseNum(e.target.value)); renderApp(); });
  document.querySelectorAll("[data-bind-num]").forEach(el => {
    el.onfocus = e => e.target.value = parseNum(e.target.value) || "";
    el.onblur = e => {
      const path = e.target.dataset.bindNum;
      let val = parseNum(e.target.value);
      // consultant invoice caps
      if(path.includes("receivedInvoice.lines.")){
        const line = getPath(path.replace(/\.claimEx$/, "")); const max = Math.max(0, parseNum(line.maxValue)-parseNum(line.certifiedToDate));
        if(line.hourly){ line.claimEx = Math.min(max, parseNum(line.hours) * parseNum(line.hourlyRate)); val = line.claimEx; }
        else val = Math.min(max, val);
      }
      if(path.includes("progressDraft.lines.") && path.endsWith(".contractorClaim")){
        const line = getPath(path.replace(/\.contractorClaim$/, "")); if(line.kind!=="Disbursement"){ const max = Math.max(0, parseNum(line.maxValue)-parseNum(line.certifiedToDate)); val = Math.min(max, val); }
      }
      if(path.includes("progressDraft.lines.") && path.endsWith(".assessedValue")){
        const line = getPath(path.replace(/\.assessedValue$/, "")); if(line.kind!=="Disbursement"){ const max = Math.max(0, parseNum(line.maxValue)-parseNum(line.certifiedToDate)); val = Math.min(max, val); }
      }
      setPath(path, val); renderApp();
    };
  });
  const file = document.getElementById("jsonFile");
  if(file) file.onchange = e => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = () => { try{ state.data = JSON.parse(r.result); saveData(); renderApp(); alert("JSON imported."); }catch(err){ alert("Invalid JSON."); } };
    r.readAsText(f);
  };
  document.querySelectorAll("[data-state]").forEach(el => el.onchange = e => { state[e.target.dataset.state] = e.target.value; renderApp(); });
}
